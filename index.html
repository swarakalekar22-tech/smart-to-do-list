<!DOCTYPE html>
<html lang="en">
<head>
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

  <div class="header">
    <h1>Today</h1>
    <p class="quote">Plan your day with clarity 💌</p>
  </div>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
